name: Build and publish GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

# Required so GITHUB_TOKEN can push the gh-pages branch (repo Settings → Actions → Workflow permissions → Read and write).
permissions:
  contents: write

concurrency:
  group: github-pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          single-commit: true
